<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#0a0a0a;font-family:'Share Tech Mono',monospace;-webkit-tap-highlight-color:transparent;}
.crt{min-height:100vh;background:#0d1a00;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,0.013) 2px,rgba(0,255,0,0.013) 4px);}
.crt::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);pointer-events:none;z-index:100;}
.ph-dim{color:#1a8a1a;}.ph-bright{color:#88ff88;text-shadow:0 0 12px #88ff88,0 0 30px #33ff3388;}
.wrap{max-width:1200px;margin:0 auto;padding:16px;}
.header{text-align:center;padding:24px 0 20px;border-bottom:1px solid #1a4a1a;margin-bottom:20px;}
.title{font-family:'VT323',monospace;font-size:46px;letter-spacing:5px;line-height:1;margin-bottom:6px;}
.subtitle{font-size:11px;letter-spacing:3px;text-transform:uppercase;}
.blink{animation:blink 1.1s step-end infinite;}@keyframes blink{50%{opacity:0;}}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
@media(max-width:680px){.panels{grid-template-columns:1fr;}.title{font-size:30px;letter-spacing:3px;}}
.panel{display:flex;flex-direction:column;border:1px solid #1a4a1a;background:#050f05;box-shadow:0 0 18px #0a2a0a,inset 0 0 28px #030803;}
.plabel{padding:9px 14px;font-size:10px;letter-spacing:4px;text-transform:uppercase;border-bottom:1px solid #1a4a1a;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:#33ff33;box-shadow:0 0 6px #33ff33;display:inline-block;flex-shrink:0;}
.dot-warn{background:#ffaa00!important;box-shadow:0 0 6px #ffaa00!important;}
.dot-js{background:#ffdd44!important;box-shadow:0 0 6px #ffdd44!important;}
textarea,#output{flex:1;background:transparent;border:none;outline:none;resize:none;padding:14px;font-family:'Share Tech Mono',monospace;font-size:13px;line-height:1.7;min-height:320px;color:#33ff33;text-shadow:0 0 5px #33ff3355;caret-color:#33ff33;}
@media(max-width:680px){textarea,#output{min-height:200px;font-size:12px;padding:10px;}}
textarea::placeholder{color:#1a4a1a;}
textarea::-webkit-scrollbar,#output::-webkit-scrollbar{width:5px;}
textarea::-webkit-scrollbar-track,#output::-webkit-scrollbar-track{background:#050f05;}
textarea::-webkit-scrollbar-thumb,#output::-webkit-scrollbar-thumb{background:#1a4a1a;}
#output{white-space:pre;overflow:auto;cursor:pointer;user-select:all;}
#output.err{color:#ff5555;text-shadow:0 0 8px #ff555566;}
#output.empty{color:#1a4a1a;white-space:pre-wrap;}
#output.spin{animation:pulse .7s ease-in-out infinite;}
.line-count{margin-left:auto;font-size:10px;letter-spacing:2px;color:#1a8a1a;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.target-bar{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.target-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#1a8a1a;width:100%;text-align:center;padding-top:14px;}
.dialect-bar{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.dialect-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#1a8a1a;width:100%;text-align:center;}
.controls{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;padding-bottom:80px;}
.btn{font-family:'VT323',monospace;font-size:22px;letter-spacing:3px;padding:12px 28px;background:transparent;border:1px solid #33ff33;color:#33ff33;text-shadow:0 0 8px #33ff33;box-shadow:0 0 10px #33ff3320,inset 0 0 10px #33ff3310;cursor:pointer;text-transform:uppercase;transition:all .15s;min-height:48px;}
.btn:hover{background:#33ff3322;box-shadow:0 0 22px #33ff3366,inset 0 0 18px #33ff3820;text-shadow:0 0 14px #33ff33,0 0 28px #33ff33;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-s{border-color:#1a6a1a;color:#1a8a1a;text-shadow:none;box-shadow:none;font-size:18px;}
.btn-s:hover{border-color:#33ff33;color:#33ff33;background:#33ff3311;text-shadow:0 0 8px #33ff33;}
.btn-active{border-color:#33ff33!important;color:#33ff33!important;text-shadow:0 0 8px #33ff33!important;background:#33ff3318!important;}
.btn-js{border-color:#bb9900;color:#ddbb00;text-shadow:0 0 8px #ddbb0088;box-shadow:0 0 10px #ddbb0010;font-size:18px;}
.btn-js:hover{background:#ddbb0022;box-shadow:0 0 22px #ddbb0055;text-shadow:0 0 14px #ddbb00;}
.btn-js.btn-active{background:#ddbb0018!important;border-color:#ddbb00!important;color:#ffdd44!important;text-shadow:0 0 8px #ffdd44!important;}
.btn-preview{font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;padding:10px 20px;background:transparent;border:1px solid #bb9900;color:#ddbb00;cursor:pointer;transition:all .15s;min-height:40px;}
.btn-preview:hover{background:#ddbb0022;color:#ffdd44;border-color:#ffdd44;}
.btn-d{border-color:#005588;color:#0099cc;text-shadow:none;box-shadow:none;font-size:14px;padding:8px 16px;min-height:36px;}
.btn-d:hover{border-color:#00ccff;color:#00ccff;background:#00ccff11;}
.btn-d.btn-active{border-color:#00ccff!important;color:#00ccff!important;background:#00ccff18!important;}
.status{border:1px solid #1a4a1a;background:#050f05;padding:9px 14px;font-size:11px;letter-spacing:2px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.examples{border:1px solid #1a4a1a;background:#050f05;margin-bottom:14px;}
.exlabel{padding:9px 14px;font-size:10px;letter-spacing:4px;border-bottom:1px solid #1a4a1a;}
.exlist{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;}
.exbtn{font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 14px;background:transparent;border:1px solid #1a4a1a;color:#1a8a1a;cursor:pointer;letter-spacing:1px;transition:all .15s;min-height:40px;}
.exbtn:hover{border-color:#33ff33;color:#33ff33;box-shadow:0 0 8px #33ff3333;}
#warns{border:1px solid #664400;background:#110800;padding:10px 14px;font-size:11px;color:#ffaa44;letter-spacing:1px;line-height:1.9;margin-bottom:14px;white-space:pre-wrap;display:none;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#33ff33;color:#050f05;font-family:'VT323',monospace;font-size:22px;letter-spacing:3px;padding:10px 26px;pointer-events:none;z-index:200;opacity:0;transition:opacity .15s;}
.toast.show{opacity:1;}
.stickybar{display:none;}
@media(max-width:680px){
  .stickybar{display:flex;position:sticky;bottom:0;z-index:50;padding:10px 16px;background:#0d1a00;border-top:1px solid #1a4a1a;gap:10px;}
  .stickybar .btn{flex:1;font-size:20px;padding:14px 10px;}
}
</style>

<body>
<div class="crt">
<div class="wrap">

<div class="header">

</div>

<div class="examples">
  <div class="exlabel ph-dim">&#9658; LOAD EXAMPLE</div>
  <div class="exlist" id="exlist"></div>
</div>

<div class="status ph-dim">
  <span>READY &#183; RULE-BASED &#183; NO AI</span>
  <span id="statusLine">APPLESOFT &#8594; PYTHON 3</span>
  <span>v5.0 &#183; 1977&#8211;1993</span>
</div>

</div>
</div>

<div class="stickybar">
  <button class="btn" onclick="doConvert()">&#9654; CONVERT</button>
  <button class="btn btn-s" onclick="copyOutput()">COPY</button>
  <button class="btn btn-s" onclick="doClear()">CLR</button>
</div>
<div class="toast" id="toast">COPIED!</div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var _target  = 'python';
var _dialect = 'apple';
var _output  = '';
var _toastTimer = null;

// ═══════════════════════════════════════════════════════════
// EXAMPLES
// ═══════════════════════════════════════════════════════════
var EXAMPLES = {
  apple: [
    {name:'Hello World', code:'10 PRINT "HELLO, WORLD!"\n20 END'},
    {name:'FOR/NEXT', code:'10 FOR I = 10 TO 1 STEP -1\n20   PRINT I; " BOTTLES"\n30 NEXT I\n40 PRINT "DONE"\n50 END'},
    {name:'ON GOTO', code:'10 PRINT "ENTER 1, 2 OR 3:"\n20 INPUT X\n30 ON X GOTO 100,200,300\n40 PRINT "INVALID": GOTO 10\n100 PRINT "ONE": GOTO 400\n200 PRINT "TWO": GOTO 400\n300 PRINT "THREE"\n400 END'},
    {name:'DEF FN', code:'10 DEF FN SQ(X) = X * X\n20 FOR I = 1 TO 5\n30   PRINT I; " SQ="; FN SQ(I)\n40 NEXT I\n50 END'},
    {name:'DATA/READ', code:'10 FOR I = 1 TO 3\n20   READ N$, S\n30   PRINT N$; " SCORED "; S\n40 NEXT I\n50 END\n100 DATA "ALICE",95,"BOB",87,"CAROL",91'},
    {name:'DOS File I/O', code:'10 PRINT CHR$(4);"OPEN SCORES"\n20 PRINT CHR$(4);"READ SCORES"\n30 INPUT N$\n40 INPUT S\n50 PRINT CHR$(4);"CLOSE"\n60 PRINT "NAME: "; N$; " SCORE: "; S\n70 END'},
    {name:'ONERR/RESUME', code:'10 ONERR GOTO 900\n20 DIM A(5)\n30 FOR I = 1 TO 8\n40   A(I) = I * 2\n50 NEXT I\n60 END\n900 PRINT "ERROR CAUGHT"\n910 RESUME NEXT'},
    {name:'CALL Examples', code:'10 CALL -936\n20 PRINT "SCREEN CLEARED"\n30 CALL -868\n40 PRINT "LINE CLEARED"\n50 POKE -16336,0\n60 PRINT "BEEP!"\n70 CALL 62450\n80 END'},
    {name:'Lo-Res GFX', code:'10 GR\n20 FOR C = 0 TO 15\n30   COLOR = C\n40   VLIN 0,39 AT C*2\n50   VLIN 0,39 AT C*2+1\n60 NEXT C\n70 END'},
    {name:'Hi-Res GFX', code:'10 HGR\n20 HCOLOR = 3\n30 FOR I = 0 TO 90 STEP 3\n40   HPLOT 139,95 TO INT(139+100*COS(I*.0349)),INT(95-100*SIN(I*.0349))\n50 NEXT I\n60 END'},
    {name:'Starfield', code:'10 HGR\n20 HCOLOR = 7\n30 FOR I = 1 TO 200\n40   X = INT(RND(1)*280)\n50   Y = INT(RND(1)*192)\n60   HPLOT X,Y\n70 NEXT I\n80 HCOLOR = 3\n90 FOR A = 0 TO 360 STEP 5\n100   X = 139+INT(80*COS(A*3.14159/180))\n110   Y = 95+INT(60*SIN(A*3.14159/180))\n120   HPLOT 139,95 TO X,Y\n130 NEXT A\n140 END'},
    {name:'DRAW Shapes', code:'10 DIM SHAPE(20)\n20 REM TRIANGLE SHAPE TABLE IN POKES\n30 FOR I=0 TO 10\n40   POKE 768+I, I*10\n50 NEXT I\n60 HGR\n70 HCOLOR=3\n80 DRAW 1 AT 100,80\n90 XDRAW 1 AT 150,80\n100 END'},
    {name:'Keyboard PEEK', code:'10 PRINT "PRESS A KEY (ESC TO QUIT)"\n20 K = PEEK(-16384)\n30 IF K < 128 THEN GOTO 20\n40 POKE -16368, 0\n50 K = K - 128\n60 IF K = 27 THEN END\n70 PRINT CHR$(K)\n80 GOTO 20'},
    {name:'Guess Number', code:'10 LET X = INT(RND(1)*100)+1\n20 PRINT "GUESS 1-100:"\n30 INPUT G\n40 IF G = X THEN GOTO 80\n50 IF G < X THEN PRINT "TOO LOW"\n60 IF G > X THEN PRINT "TOO HIGH"\n70 GOTO 30\n80 PRINT "CORRECT! IT WAS "; X\n90 END'}
  ],
  gw: [
    {name:'Hello World', code:'10 PRINT "HELLO, WORLD!"\n20 END'},
    {name:'LOCATE + COLOR', code:'10 CLS\n20 LOCATE 5,10\n30 COLOR 14,1\n40 PRINT "GW-BASIC DEMO"\n50 COLOR 7,0\n60 LOCATE 10,1\n70 PRINT "NORMAL TEXT"\n80 END'},
    {name:'LINE Graphics', code:'10 SCREEN 1\n20 LINE (0,0)-(319,199),3\n30 LINE (160,0)-(0,199),2\n40 LINE (160,0)-(319,199),1\n50 CIRCLE (160,100),50,3\n60 PSET (160,100),2\n70 END'},
    {name:'INKEY$ Loop', code:'10 PRINT "PRESS Q TO QUIT"\n20 K$ = INKEY$\n30 IF K$ = "" THEN GOTO 20\n40 IF K$ = "Q" OR K$ = "q" THEN END\n50 PRINT "KEY: "; K$\n60 GOTO 20'},
    {name:'File I/O', code:'10 OPEN "DATA.TXT" FOR OUTPUT AS #1\n20 PRINT #1, "ALICE",95\n30 PRINT #1, "BOB",87\n40 CLOSE #1\n50 OPEN "DATA.TXT" FOR INPUT AS #1\n60 INPUT #1, N$, S\n70 PRINT N$; " "; S\n80 CLOSE #1\n90 END'},
    {name:'PLAY Music', code:'10 PLAY "T120 L4 CDEFGAB"\n20 PLAY "O3 L8 CDECCDECEFGEFG"\n30 END'}
  ],
  c64: [
    {name:'Hello World', code:'10 PRINT "HELLO, WORLD!"\n20 END'},
    {name:'POKE Colors', code:'10 POKE 53280,0\n20 POKE 53281,0\n30 PRINT CHR$(147)\n40 FOR I = 1 TO 16\n50   POKE 646, I-1\n60   PRINT "COLOR"; I\n70 NEXT I\n80 END'},
    {name:'SYS + PEEK', code:'10 PRINT "MEMORY TEST"\n20 FOR A = 49152 TO 49162\n30   POKE A, 0\n40   PRINT PEEK(A);\n50 NEXT A\n60 END'},
    {name:'Sprite Demo', code:'10 REM COMMODORE 64 SPRITE SETUP\n20 POKE 2040,192\n30 FOR I=0 TO 62\n40   POKE 12288+I,255\n50 NEXT I\n60 POKE 53248,100\n70 POKE 53249,100\n80 POKE 53269,1\n90 END'}
  ],
  bbc: [
    {name:'Hello World', code:'10 PRINT "HELLO, WORLD!"\n20 END'},
    {name:'PROC Demo', code:'10 CALL ShowTitle\n20 FOR I = 1 TO 5\n30   CALL PrintNum(I)\n40 NEXT I\n50 END\n100 DEF PROC ShowTitle\n110   PRINT "BBC BASIC DEMO"\n120 ENDPROC\n200 DEF PROC PrintNum(N)\n210   PRINT "NUMBER: "; N\n220 ENDPROC'},
    {name:'MODE Graphics', code:'10 MODE 4\n20 MOVE 0,0\n30 DRAW 1279,0\n40 DRAW 1279,1023\n50 DRAW 0,1023\n60 DRAW 0,0\n70 FOR I = 0 TO 500 STEP 10\n80   MOVE 640,512\n90   DRAW 640+I,512-I\n100 NEXT I\n110 END'},
    {name:'VDU Commands', code:'10 VDU 26\n20 VDU 28,0,24,39,0\n30 CLS\n40 PRINT TAB(10,5); "BBC MICRO"\n50 COLOUR 1\n60 PRINT TAB(10,10); "RED TEXT"\n70 COLOUR 7\n80 END'}
  ]
};

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
function setTarget(t) {
  _target = t;
  document.getElementById('btnPy').className   = 'btn btn-s' + (t==='python'?' btn-active':'');
  document.getElementById('btnHtml').className = 'btn btn-js' + (t==='html'?' btn-active':'');
  document.getElementById('outLabel').textContent = t==='html' ? 'HTML / JAVASCRIPT OUTPUT' : 'PYTHON 3 OUTPUT';
  document.getElementById('outDot').className  = 'dot' + (t==='html'?' dot-js':'');
  updateStatus(); clearOutput();
}

function setDialect(d) {
  _dialect = d;
  var names = {apple:'APPLESOFT',gw:'GW-BASIC',c64:'COMMODORE 64',bbc:'BBC BASIC'};
  ['apple','gw','c64','bbc'].forEach(function(id) {
    document.getElementById('d'+id.charAt(0).toUpperCase()+id.slice(1)).className = 'btn-d' + (id===d?' btn-active':'');
  });
  // fix IDs
  document.getElementById('dApple').className = 'btn-d' + (d==='apple'?' btn-active':'');
  document.getElementById('dGW').className    = 'btn-d' + (d==='gw'   ?' btn-active':'');
  document.getElementById('dC64').className   = 'btn-d' + (d==='c64'  ?' btn-active':'');
  document.getElementById('dBBC').className   = 'btn-d' + (d==='bbc'  ?' btn-active':'');
  document.getElementById('inputLabel').textContent = names[d] + ' BASIC INPUT';
  buildExamples(); updateStatus(); clearOutput();
}

function updateStatus() {
  var dNames = {apple:'APPLESOFT',gw:'GW-BASIC',c64:'C64 BASIC',bbc:'BBC BASIC'};
  var tName  = _target==='html' ? 'HTML/JS' : 'PYTHON 3';
  document.getElementById('statusLine').textContent = dNames[_dialect] + ' \u2192 ' + tName;
}

var PLACEHOLDER_PY   = '# ── SUPPORTED COMMANDS ──────────────────\n# PRINT ? INPUT GET READ DATA RESTORE\n# FOR/NEXT/STEP GOTO GOSUB RETURN\n# ON..GOTO ON..GOSUB IF/THEN/ELSE\n# DEF FN DIM ONERR RESUME END STOP\n# GR HGR HGR2 COLOR= HCOLOR=\n# PLOT VLIN HLIN HPLOT..TO\n# DRAW/XDRAW AT (shape table decoder)\n# CALL (ROM lookup: -936 -868 -922 etc)\n# PEEK(-16384) keyboard non-blocking\n# POKE -16336 speaker click -> sound\n# CHR$(4);"OPEN/READ/WRITE" DOS files\n# GW-BASIC: LOCATE LINE CIRCLE PSET\n#           INKEY$ COLOR SCREEN PLAY\n# C64: POKE SYS colors sprites\n# BBC: MODE MOVE DRAW PROC VDU';
var PLACEHOLDER_HTML = '<!-- SUPPORTED: all Applesoft + GW-BASIC\n     + C64 BASIC + BBC BASIC\n     Self-contained runnable HTML output\n     with Apple ][ terminal + canvas\n     graphics, async INPUT, sound -->';

function clearOutput() {
  _output = '';
  var el = document.getElementById('output');
  el.className = 'empty';
  el.textContent = _target==='html' ? PLACEHOLDER_HTML : PLACEHOLDER_PY;
  document.getElementById('lineCount').textContent = '';
  document.getElementById('btnCopy').disabled = true;
  document.getElementById('btnPreview').style.display = 'none';
  var w = document.getElementById('warns'); w.style.display='none'; w.textContent='';
}

function doClear() { document.getElementById('input').value = ''; clearOutput(); }

function setOutput(code, warnings, isErr) {
  _output = code;
  var el = document.getElementById('output');
  el.className = isErr ? 'err' : '';
  el.textContent = code;
  document.getElementById('lineCount').textContent = code.split('\n').length + ' LINES';
  document.getElementById('btnCopy').disabled = false;
  if (!isErr && _target==='html') document.getElementById('btnPreview').style.display = '';
  if (warnings && warnings.length) {
    var w = document.getElementById('warns');
    w.textContent = '\u26a0  ' + warnings.join('\n\u26a0  ');
    w.style.display = '';
  }
  document.getElementById('outputPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

function copyOutput() {
  if (!_output) return;
  navigator.clipboard.writeText(_output).then(function() {
    var t = document.getElementById('toast'); t.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function(){t.classList.remove('show');}, 1600);
  });
}

function previewHTML() {
  if (!_output || _target!=='html') return;
  window.open(URL.createObjectURL(new Blob([_output],{type:'text/html'})),'_blank');
}

function doConvert() {
  var code = document.getElementById('input').value;
  if (!code.trim()) return;
  var btn = document.getElementById('btnConvert');
  btn.innerHTML = 'CONVERTING...'; btn.disabled = true;
  var el = document.getElementById('output');
  el.className='spin'; el.textContent='# CONVERTING...';
  setTimeout(function() {
    try {
      var result;
      if (_dialect==='apple') result = _target==='html' ? convertToHTML(code) : convertToPython(code);
      else result = _target==='html' ? convertAltToHTML(code,_dialect) : convertAltToPython(code,_dialect);
      setOutput(result.code, result.warnings, false);
    } catch(e) {
      setOutput('# Conversion error:\n# '+e.message, [], true);
    }
    btn.innerHTML='&#9654; CONVERT'; btn.disabled=false;
  }, 30);
}

function buildExamples() {
  var el = document.getElementById('exlist');
  el.innerHTML = '';
  var exs = EXAMPLES[_dialect] || EXAMPLES.apple;
  exs.forEach(function(ex) {
    var b = document.createElement('button');
    b.className='exbtn'; b.textContent=ex.name;
    b.onclick=function(){ document.getElementById('input').value=ex.code; clearOutput(); window.scrollTo({top:0,behavior:'smooth'}); };
    el.appendChild(b);
  });
}

(function init(){buildExamples();clearOutput();})();

// ═══════════════════════════════════════════════════════════
// SHARED PARSING HELPERS
// ═══════════════════════════════════════════════════════════
function splitColon(s) {
  var parts=[],cur='',inStr=false;
  for(var i=0;i<s.length;i++){var ch=s[i];if(ch==='"')inStr=!inStr;if(!inStr&&ch===':'){parts.push(cur.trim());cur='';}else cur+=ch;}
  if(cur.trim())parts.push(cur.trim());return parts;
}
function parseDataLine(rest) {
  var items=[],cur='',inStr=false;
  for(var i=0;i<rest.length;i++){var ch=rest[i];if(ch==='"'){inStr=!inStr;cur+=ch;continue;}if(!inStr&&ch===','){items.push(cur.trim());cur='';continue;}cur+=ch;}
  if(cur.trim()!=='')items.push(cur.trim());return items;
}
function parseNumbered(code) {
  var numbered=[];
  code.trim().split(/\r?\n/).forEach(function(raw){var m=raw.match(/^\s*(\d+)\s*(.*)/);if(m)numbered.push({num:parseInt(m[1]),stmt:m[2].trim()});});
  return numbered;
}

// ═══════════════════════════════════════════════════════════
// SHAPE TABLE DECODER
// Apple II shape tables: binary data encoded as direction vectors
// Directions: 0=up,1=up-right,2=right,3=down-right,
//             4=down,5=down-left,6=left,7=up-left
// Bit 6 set = plot point; bit 7 set = end of shape
// ═══════════════════════════════════════════════════════════
function decodeShapeTable(mem, baseAddr) {
  // mem is the _mem object, baseAddr is where the table starts
  // Returns array of {x,y,plot} vectors for each shape
  var shapes = [];
  try {
    var numShapes = mem[baseAddr] || 1;
    for (var s = 1; s <= numShapes; s++) {
      var offsetLo = mem[baseAddr + s*2 - 1] || 0;
      var offsetHi = mem[baseAddr + s*2]     || 0;
      var shapeStart = baseAddr + offsetLo + offsetHi*256;
      var vectors = [];
      var cx=0, cy=0;
      var maxBytes = 64;
      for (var i=0; i<maxBytes; i++) {
        var b = mem[shapeStart + i] || 0;
        if (b === 0) break;
        // Each byte can encode 1 or 2 vectors
        // Low 3 bits = first vector direction
        // Bit 2 = plot for first vector
        // Bits 3-5 = second vector direction (if nonzero)
        // Bit 5 = plot for second vector
        // Bit 6 = set means END
        var dir1  = b & 7;
        var plot1 = (b & 64) !== 0;
        var dir2  = (b >> 3) & 7;
        var dx1=0,dy1=0,dx2=0,dy2=0;
        var DX=[0,1,1,1,0,-1,-1,-1], DY=[-1,-1,0,1,1,1,0,-1];
        dx1=DX[dir1]; dy1=DY[dir1];
        cx+=dx1; cy+=dy1;
        if(plot1) vectors.push({x:cx,y:cy,plot:true});
        else vectors.push({x:cx,y:cy,plot:false});
        if(dir2 !== 0) {
          dx2=DX[dir2]; dy2=DY[dir2];
          var plot2 = (b & 32) !== 0;
          cx+=dx2; cy+=dy2;
          if(plot2) vectors.push({x:cx,y:cy,plot:true});
        }
        if((b & 128) !== 0) break; // end of shape
      }
      shapes.push(vectors);
    }
  } catch(e) { shapes = []; }
  return shapes;
}

// ═══════════════════════════════════════════════════════════
// PYTHON EXPRESSION CONVERTER
// ═══════════════════════════════════════════════════════════
function exprConvPy(e,fnDefs) {
  e=e.trim();
  e=e.replace(/\bINT\s*\(/gi,'int(');
  e=e.replace(/\bABS\s*\(/gi,'abs(');
  e=e.replace(/\bSGN\s*\(/gi,'_sgn(');
  e=e.replace(/\bSQR\s*\(/gi,'math.sqrt(');
  e=e.replace(/\bSIN\s*\(/gi,'math.sin(');
  e=e.replace(/\bCOS\s*\(/gi,'math.cos(');
  e=e.replace(/\bTAN\s*\(/gi,'math.tan(');
  e=e.replace(/\bATN\s*\(/gi,'math.atan(');
  e=e.replace(/\bEXP\s*\(/gi,'math.exp(');
  e=e.replace(/\bLOG\s*\(/gi,'math.log(');
  e=e.replace(/\bRND\s*\(\s*0\s*\)/gi,'_rnd(0)');
  e=e.replace(/\bRND\s*\(([^)]+)\)/gi,function(_,a){return '_rnd('+exprConvPy(a,fnDefs)+')';});
  e=e.replace(/\bLEN\s*\(/gi,'len(');
  e=e.replace(/\bMID\$\s*\(/gi,'_midS(');
  e=e.replace(/\bLEFT\$\s*\(/gi,'_leftS(');
  e=e.replace(/\bRIGHT\$\s*\(/gi,'_rightS(');
  e=e.replace(/\bSTR\$\s*\(/gi,'str(');
  e=e.replace(/\bVAL\s*\(/gi,'float(');
  e=e.replace(/\bCHR\$\s*\(/gi,'chr(int(');
  e=e.replace(/\bASC\s*\(/gi,'ord(');
  e=e.replace(/\bSPC\s*\(/gi,'_spc(');
  e=e.replace(/\bTAB\s*\(/gi,'_tab(');
  e=e.replace(/\bSCRN\s*\(/gi,'_scrn(');
  e=e.replace(/\bPDL\s*\(/gi,'_pdl(');
  e=e.replace(/\bFRE\s*\(/gi,'_fre(');
  e=e.replace(/\bUSR\s*\(/gi,'_usr(');
  // Special PEEK addresses
  e=e.replace(/\bPEEK\s*\(\s*(-?\d+)\s*\)/gi,function(_,addr){
    var key=addr.trim();
    return PEEK_SPECIAL_PY[key] || ('_peek('+key+')');
  });
  e=e.replace(/\bPEEK\s*\(/gi,'_peek(');
  e=e.replace(/\bFN\s+([A-Za-z][A-Za-z0-9]*)\s*\(([^)]*)\)/gi,function(_,nm,arg){return '_fn_'+nm.toLowerCase()+'('+exprConvPy(arg,fnDefs)+')';});
  e=e.replace(/([A-Za-z][A-Za-z0-9]*)\%/g,function(_,v){return '_i_'+v.toLowerCase();});
  e=e.replace(/([A-Za-z][A-Za-z0-9]*)\$/g,function(_,v){return '_s_'+v.toLowerCase();});
  e=e.replace(/<>/g,'!='); e=e.replace(/\^/g,'**');
  e=e.replace(/\bAND\b/gi,' and '); e=e.replace(/\bOR\b/gi,' or '); e=e.replace(/\bNOT\b/gi,' not ');
  e=e.replace(/\b([A-Z][A-Z0-9]*)\b/g,function(m){return m.toLowerCase();});
  return e;
}

function convPrintArgsPy(args,fnDefs) {
  if(args.trim()==='')return 'print()';
  var trailSemi=/;\s*$/.test(args),trailComma=/,\s*$/.test(args);
  var parts=[],cur='',inStr=false,depth=0;
  for(var i=0;i<args.length;i++){var ch=args[i];
    if(ch==='"')inStr=!inStr;
    if(!inStr){if(ch==='('||ch==='[')depth++;if(ch===')'||ch===']')depth--;}
    if(!inStr&&depth===0&&(ch===';'||ch===',')){if(cur.trim())parts.push(cur.trim());cur='';}
    else cur+=ch;}
  if(cur.trim())parts.push(cur.trim());
  var pp=parts.map(function(p){var v=exprConvPy(p,fnDefs);return(/^"/.test(v)||/^_s_/.test(v)||v.startsWith("'"))?v:'str('+v+')';});
  var j=pp.join(', ');
  if(trailSemi)return 'print('+j+", end='')";
  if(trailComma)return 'print('+j+", end='\\t')";
  return 'print('+j+')';
}

// Detect DOS 3.3 CHR$(4) file commands
function dosCmd(stmt,ind,warnings) {
  // Pattern: PRINT CHR$(4);"OPEN filename" etc
  var m=stmt.match(/^(?:PRINT|\?)\s*CHR\$\s*\(\s*4\s*\)\s*[;,]\s*"([^"]*)"/i);
  if(!m)return null;
  var cmd=m[1].trim().toUpperCase();
  var parts=cmd.split(/\s+/,2);
  var op=parts[0], fname=parts[1]||'_dos_file';
  var pyFname='"'+fname.toLowerCase()+'"';
  if(op==='OPEN')   return [ind+'_dos_open('+pyFname+',"r")'];
  if(op==='APPEND') return [ind+'_dos_open('+pyFname+',"a")'];
  if(op==='WRITE')  return [ind+'_dos_open('+pyFname+',"w")'];
  if(op==='CREATE') return [ind+'_dos_open('+pyFname+',"w")'];
  if(op==='CLOSE')  return [ind+'_dos_close()'];
  if(op==='DELETE') return [ind+'import os; os.remove('+pyFname+') if os.path.exists('+pyFname+') else None'];
  if(op==='READ')   return [ind+'_dos_set_read()'];
  if(op==='EXEC')   { warnings.push('DOS EXEC not supported'); return [ind+'pass  # EXEC '+fname]; }
  return null;
}
function dosCmdJS(stmt,ind,warnings) {
  var m=stmt.match(/^(?:PRINT|\?)\s*CHR\$\s*\(\s*4\s*\)\s*[;,]\s*"([^"]*)"/i);
  if(!m)return null;
  var cmd=m[1].trim().toUpperCase();
  var parts=cmd.split(/\s+/,2);
  var op=parts[0], fname=(parts[1]||'file').toLowerCase();
  if(op==='OPEN')   return [ind+'_dosOpen("'+fname+'","r");'];
  if(op==='APPEND') return [ind+'_dosOpen("'+fname+'","a");'];
  if(op==='WRITE')  return [ind+'_dosOpen("'+fname+'","w");'];
  if(op==='CREATE') return [ind+'_dosOpen("'+fname+'","w");'];
  if(op==='CLOSE')  return [ind+'_dosClose();'];
  if(op==='DELETE') return [ind+'_dosDelete("'+fname+'");'];
  if(op==='READ')   return [ind+'_dosSetRead();'];
  return null;
}

// ═══════════════════════════════════════════════════════════
// PYTHON STATEMENT CONVERTER (Applesoft)
// ═══════════════════════════════════════════════════════════
function convStmtPy(stmt,ind,ctx) {
  var warnings=ctx.warnings,fnDefs=ctx.fnDefs;
  stmt=stmt.trim(); if(!stmt)return[];
  var out=[],E=function(x){return exprConvPy(x,fnDefs);};

  if(/^REM\b/i.test(stmt)||stmt.startsWith("'")){out.push(ind+'# '+stmt.replace(/^REM\s*/i,'').replace(/^'/,''));return out;}
  if(/^END$/i.test(stmt)){out.push(ind+'_end()');return out;}
  if(/^STOP$/i.test(stmt)){out.push(ind+'_stop(_line)');return out;}
  if(/^CONT$/i.test(stmt)){out.push(ind+'pass  # CONT');return out;}

  // DOS 3.3 CHR$(4) file commands — must check before PRINT
  var dosOut=dosCmd(stmt,ind,warnings);
  if(dosOut)return dosOut;

  var prM=stmt.match(/^(?:PRINT|\?)\s*(.*)/is);
  if(prM){out.push(ind+convPrintArgsPy(prM[1],fnDefs));return out;}

  var inM=stmt.match(/^INPUT\s+(.+)/i);
  if(inM){
    var rest=inM[1].trim(),prompt='"? "';
    var pm=rest.match(/^"([^"]*)"\s*[;,]\s*(.+)/);
    if(pm){prompt='"'+pm[1]+' "';rest=pm[2];}
    rest.split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$$/.test(vt);
      out.push(isStr?ind+pv+' = input('+prompt+')':ind+pv+' = float(input('+prompt+'))');});
    return out;
  }

  // INPUT from DOS file
  var inDosM=stmt.match(/^INPUT\s*#\s*\d+\s*,\s*(.+)/i);
  if(inDosM){
    inDosM[1].split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$$/.test(vt);
      out.push(isStr?ind+pv+' = _dos_input_str()':ind+pv+' = _dos_input_num()');});
    return out;
  }

  var getM=stmt.match(/^GET\s+(.+)/i);
  if(getM){out.push(ind+E(getM[1].trim())+' = _get()');return out;}

  var readM=stmt.match(/^READ\s+(.+)/i);
  if(readM){readM[1].split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$$/.test(vt);
    out.push(isStr?ind+pv+' = str(_data[_dp]); _dp += 1':ind+pv+' = float(_data[_dp]); _dp += 1');});return out;}

  if(/^RESTORE$/i.test(stmt)){out.push(ind+'_dp = 0');return out;}
  if(/^DATA\b/i.test(stmt)){out.push(ind+'# DATA '+stmt.slice(4).trim());return out;}

  var defM=stmt.match(/^DEF\s+FN\s+([A-Za-z][A-Za-z0-9]*)\s*\(([^)]*)\)\s*=\s*(.+)/i);
  if(defM){var nm=defM[1].toLowerCase(),param=E(defM[2].trim()),body=E(defM[3]);fnDefs.push(nm);
    out.push(ind+'def _fn_'+nm+'('+param+'): return '+body);return out;}

  var letM=stmt.match(/^(?:LET\s+)?([A-Za-z][A-Za-z0-9]*(?:[%$])?(?:\s*\([^)]+\))?)\s*=\s*(.+)/i);
  if(letM){out.push(ind+E(letM[1])+' = '+E(letM[2]));return out;}

  var forM=stmt.match(/^FOR\s+([A-Za-z][A-Za-z0-9]*%?)\s*=\s*(.+?)\s+TO\s+(.+?)(?:\s+STEP\s+(.+))?$/i);
  if(forM){var v=E(forM[1]),s=E(forM[2]),e2=E(forM[3]),st=forM[4]?E(forM[4]):'1';
    var vk=v.replace(/[^a-z0-9]/g,'_');
    out.push(ind+v+' = '+s+'; _for_end_'+vk+' = '+e2+'; _for_step_'+vk+' = '+st);return out;}
  if(/^NEXT\b/i.test(stmt)){out.push(ind+'pass  # NEXT');return out;}

  var gotoM=stmt.match(/^GOTO\s+(\d+)$/i);
  if(gotoM){out.push(ind+'_line='+gotoM[1]+';continue');return out;}

  var onGotoM=stmt.match(/^ON\s+(.+?)\s+GOTO\s+(.+)$/i);
  if(onGotoM){var tgts=onGotoM[2].split(',').map(function(t){return t.trim();});
    out.push(ind+'_on_idx = int('+E(onGotoM[1])+') - 1');
    tgts.forEach(function(t,i){out.push(ind+(i===0?'if':'elif')+' _on_idx=='+i+': _line='+t+';continue');});return out;}

  var onGosubM=stmt.match(/^ON\s+(.+?)\s+GOSUB\s+(.+)$/i);
  if(onGosubM){var tgts=onGosubM[2].split(',').map(function(t){return t.trim();});
    out.push(ind+'_on_idx = int('+E(onGosubM[1])+') - 1');
    tgts.forEach(function(t,i){out.push(ind+(i===0?'if':'elif')+' _on_idx=='+i+': _ret.append(_line);_line='+t+';continue');});return out;}

  var gosubM=stmt.match(/^GOSUB\s+(\d+)$/i);
  if(gosubM){out.push(ind+'_ret.append(_line);_line='+gosubM[1]+';continue');return out;}
  if(/^RETURN$/i.test(stmt)){out.push(ind+'_line=_ret.pop();continue');return out;}
  if(/^POP$/i.test(stmt)){out.push(ind+'if _ret: _ret.pop()');return out;}

  var onerrM=stmt.match(/^ONERR\s+GOTO\s+(\d+)$/i);
  if(onerrM){out.push(ind+'_onerr = '+onerrM[1]);return out;}
  if(/^RESUME\s+NEXT$/i.test(stmt)){out.push(ind+'_err_flag=False;_line=_resume_next_line;continue');return out;}
  if(/^RESUME$/i.test(stmt)){out.push(ind+'_err_flag=False');return out;}

  var ifElseM=stmt.match(/^IF\s+(.+?)\s+THEN\s+(.+?)\s+ELSE\s+(.+)$/i);
  if(ifElseM){out.push(ind+'if '+E(ifElseM[1])+':');
    out.push.apply(out,convStmtPy(ifElseM[2].trim(),ind+'    ',ctx));
    out.push(ind+'else:');out.push.apply(out,convStmtPy(ifElseM[3].trim(),ind+'    ',ctx));return out;}

  var ifM=stmt.match(/^IF\s+(.+?)\s+THEN\s+(.+)$/i);
  if(ifM){var then=ifM[2].trim(),gonly=then.match(/^(?:GOTO\s+)?(\d+)$/i);
    out.push(ind+'if '+E(ifM[1])+':');
    if(gonly)out.push(ind+'    _line='+gonly[1]+';continue');
    else splitColon(then).forEach(function(s){out.push.apply(out,convStmtPy(s,ind+'    ',ctx));});return out;}

  var ifGotoM=stmt.match(/^IF\s+(.+?)\s+GOTO\s+(\d+)$/i);
  if(ifGotoM){out.push(ind+'if '+E(ifGotoM[1])+': _line='+ifGotoM[2]+';continue');return out;}

  var dimM=stmt.match(/^DIM\s+(.+)$/i);
  if(dimM){var decls=[],cur='',depth=0;
    (dimM[1]+',').split('').forEach(function(ch){if(ch==='(')depth++;if(ch===')')depth--;if(ch===','&&depth===0){decls.push(cur.trim());cur='';}else cur+=ch;});
    decls.forEach(function(d){var am=d.match(/([A-Za-z][A-Za-z0-9]*[%$]?)\s*\(([^)]+)\)/i);
      if(am){var nm=E(am[1]),dims=am[2].split(',').map(function(x){return parseInt(x.trim())+1;});
        if(dims.length===1)out.push(ind+nm+'=[0]*'+dims[0]);
        else if(dims.length===2)out.push(ind+nm+'=[[0]*'+dims[1]+' for _ in range('+dims[0]+')]');
        else out.push(ind+nm+'=[[[0]*'+dims[2]+' for _ in range('+dims[1]+')] for _ in range('+dims[0]+')]');}});
    return out;}

  // Graphics
  if(/^GR$/i.test(stmt)){out.push(ind+"_gr_init('lo')");return out;}
  if(/^HGR2$/i.test(stmt)){out.push(ind+"_gr_init('hi2')");return out;}
  if(/^HGR$/i.test(stmt)){out.push(ind+"_gr_init('hi')");return out;}
  var colorM=stmt.match(/^COLOR\s*=\s*(.+)$/i);
  if(colorM){out.push(ind+'_gr_color(int('+E(colorM[1])+'))');return out;}
  var hcolorM=stmt.match(/^HCOLOR\s*=\s*(.+)$/i);
  if(hcolorM){out.push(ind+'_gr_hcolor(int('+E(hcolorM[1])+'))');return out;}
  var scaleM=stmt.match(/^SCALE\s*=\s*(.+)$/i);
  if(scaleM){out.push(ind+'_gr_scale=int('+E(scaleM[1])+')');return out;}
  var rotM=stmt.match(/^ROT\s*=\s*(.+)$/i);
  if(rotM){out.push(ind+'_gr_rot=int('+E(rotM[1])+')');return out;}
  var plotM=stmt.match(/^PLOT\s+(.+?)\s*,\s*(.+)$/i);
  if(plotM){out.push(ind+'_gr_plot(int('+E(plotM[1])+'),int('+E(plotM[2])+'))');return out;}
  var hplotM=stmt.match(/^HPLOT\s+(.+)$/i);
  if(hplotM){var pts=hplotM[1].split(/\bTO\b/i).map(function(p){return p.trim();});
    var xy0=pts[0].split(',').map(function(q){return q.trim();});
    out.push(ind+'_gr_hmove(int('+E(xy0[0])+'),int('+E(xy0[1])+'))');
    for(var i=1;i<pts.length;i++){var xy=pts[i].split(',').map(function(q){return q.trim();});out.push(ind+'_gr_hline_to(int('+E(xy[0])+'),int('+E(xy[1])+'))');}
    return out;}
  var vlinM=stmt.match(/^VLIN\s+(.+?)\s*,\s*(.+?)\s+AT\s+(.+)$/i);
  if(vlinM){out.push(ind+'_gr_vlin(int('+E(vlinM[1])+'),int('+E(vlinM[2])+'),int('+E(vlinM[3])+'))');return out;}
  var hlinM=stmt.match(/^HLIN\s+(.+?)\s*,\s*(.+?)\s+AT\s+(.+)$/i);
  if(hlinM){out.push(ind+'_gr_hlin(int('+E(hlinM[1])+'),int('+E(hlinM[2])+'),int('+E(hlinM[3])+'))');return out;}

  // DRAW/XDRAW — shape table with decoder
  var drawM=stmt.match(/^(X?)DRAW\s+(.+?)\s+AT\s+(.+?)\s*,\s*(.+)$/i);
  if(drawM){
    var isXdraw=drawM[1].toUpperCase()==='X';
    out.push(ind+'_gr_draw_shape(int('+E(drawM[2])+'),int('+E(drawM[3])+'),int('+E(drawM[4])+'),'+isXdraw+',_gr_scale,_gr_rot)');
    return out;
  }
  // DRAW without AT (shape index only)
  var draw2M=stmt.match(/^(X?)DRAW\s+(\d+)$/i);
  if(draw2M){
    var isXdraw=draw2M[1].toUpperCase()==='X';
    out.push(ind+'_gr_draw_shape(int('+E(draw2M[2])+'),_gr_cx,_gr_cy,'+isXdraw+',_gr_scale,_gr_rot)');
    return out;
  }

  if(/^TEXT$/i.test(stmt)){out.push(ind+'_gr_text()');return out;}
  if(/^HOME$/i.test(stmt)){out.push(ind+"print('\\033[2J\\033[H',end='')");return out;}
  if(/^INVERSE$/i.test(stmt)){out.push(ind+"print('\\033[7m',end='')");return out;}
  if(/^NORMAL$/i.test(stmt)){out.push(ind+"print('\\033[0m',end='')");return out;}
  if(/^FLASH$/i.test(stmt)){out.push(ind+"print('\\033[5m',end='')");return out;}
  var vtabM=stmt.match(/^VTAB\s+(.+)$/i);
  if(vtabM){out.push(ind+"print(f'\\033[{int("+E(vtabM[1])+")+1};1H',end='')");return out;}
  var htabM=stmt.match(/^HTAB\s+(.+)$/i);
  if(htabM){out.push(ind+"print(f'\\033[{int("+E(htabM[1])+")}G',end='')");return out;}

  // POKE with special hardware address handling
  var pokeM=stmt.match(/^POKE\s+(-?\d+)\s*,\s*(.+)$/i);
  if(pokeM){
    var addr=pokeM[1].trim(),val=E(pokeM[2]);
    if(POKE_SPECIAL_PY[addr]){
      if(POKE_SPECIAL_PY[addr].endsWith('()')){out.push(ind+POKE_SPECIAL_PY[addr]);}
      else out.push(ind+'_poke('+addr+','+val+')');
    } else {
      out.push(ind+'_poke('+addr+',int('+val+'))');
    }
    return out;
  }
  // POKE with expression address
  var pokeExprM=stmt.match(/^POKE\s+(.+?)\s*,\s*(.+)$/i);
  if(pokeExprM){out.push(ind+'_poke(int('+E(pokeExprM[1])+'),int('+E(pokeExprM[2])+'))');return out;}

  // CALL with ROM lookup table
  var callM=stmt.match(/^CALL\s+(-?\d+)$/i);
  if(callM){
    var caddr=callM[1].trim();
    if(CALL_TABLE_PY[caddr]){out.push(ind+CALL_TABLE_PY[caddr]);}
    else{out.push(ind+'_call_usr('+caddr+')  # CALL '+caddr);}
    return out;
  }
  var callExprM=stmt.match(/^CALL\s+(.+)$/i);
  if(callExprM){out.push(ind+'_call_usr(int('+E(callExprM[1])+'))');return out;}

  if(/^(HIMEM|LOMEM)\s*:/i.test(stmt)||/^SPEED\s*=/i.test(stmt)){out.push(ind+'pass  # '+stmt);return out;}
  if(/^(PR|IN)#\s*\d+$/i.test(stmt)){out.push(ind+'pass  # '+stmt);return out;}
  if(/^TRACE$/i.test(stmt)){out.push(ind+'_trace=True');return out;}
  if(/^NOTRACE$/i.test(stmt)){out.push(ind+'_trace=False');return out;}
  if(/^CLEAR$/i.test(stmt)){out.push(ind+'pass  # CLEAR');return out;}
  if(/^(NEW|LIST|LOAD|SAVE|RUN)$/i.test(stmt)){out.push(ind+'pass  # '+stmt);return out;}

  warnings.push('Unrecognised: "'+stmt+'"');
  out.push(ind+'# TODO: '+stmt);
  return out;
}

// ═══════════════════════════════════════════════════════════
// PYTHON CONVERTER — MAIN
// ═══════════════════════════════════════════════════════════
function convertToPython(code) {
  var warnings=[],fnDefs=[],numbered=parseNumbered(code);
  if(!numbered.length)throw new Error('No valid BASIC line numbers found.');
  var lineNums=numbered.map(function(l){return l.num;});
  var src=code.toUpperCase(),has=function(re){return re.test(src);};
  var needsTk=has(/\b(GR|HGR|HGR2|PLOT|HPLOT|VLIN|HLIN|DRAW|XDRAW)\b/);
  var hasMath=has(/\b(SQR|SIN|COS|TAN|ATN|LOG|EXP)\b/),hasRnd=has(/\bRND\b/);
  var hasData=has(/\bDATA\b/),hasOnerr=has(/\bONERR\b/),hasGosub=has(/\bGOSUB\b/);
  var hasTrace=has(/\bTRACE\b/),hasResNext=has(/\bRESUME\s+NEXT\b/);
  var hasGet=has(/\bGET\b/),hasScrn=has(/\bSCRN\b/),hasPdl=has(/\bPDL\b/);
  var hasKb=has(/PEEK\s*\(\s*-?16384\b/)||has(/PEEK\s*\(\s*49152\b/);
  var hasSpeaker=has(/POKE\s*-?16336\b/)||has(/POKE\s*49200\b/);
  var hasDraw=has(/\b(DRAW|XDRAW)\b/);
  var hasDos=has(/CHR\$\s*\(\s*4\s*\)/);
  var hasFileInput=has(/INPUT\s*#/)||has(/PRINT\s*#/);
  var dataValues=[];
  numbered.forEach(function(l){if(/^DATA\b/i.test(l.stmt))parseDataLine(l.stmt.slice(4).trim()).forEach(function(it){dataValues.push(it);});});
  var ctx={warnings:warnings,fnDefs:fnDefs,needsTk:needsTk};
  var L=[],p=function(){for(var i=0;i<arguments.length;i++)L.push(arguments[i]);};

  p('# ═══════════════════════════════════════════════════════');
  p('# Converted from Applesoft BASIC  \u2192  Python 3');
  p('# Apple ][ \u2192 Code Converter  v5.0');
  p('# ═══════════════════════════════════════════════════════');
  p('');
  if(hasMath||needsTk)p('import math');
  if(hasRnd)p('import random');
  if(needsTk)p('import tkinter as tk');
  if(hasKb||hasGet)p('import threading, queue, sys');
  else p('import sys');
  if(hasGet)p('import tty, termios');
  if(hasSpeaker)p('import math as _math_sound');
  if(hasDos||hasFileInput)p('import os');
  p('');

  // Core helpers
  p('def _sgn(x): return 1 if x>0 else (-1 if x<0 else 0)');
  p('_rnd_last=0.0');
  p('def _rnd(x):');
  p('    global _rnd_last');
  p('    if x>0: _rnd_last=random.random(); return _rnd_last');
  p('    if x==0: return _rnd_last');
  p('    random.seed(int(x)); _rnd_last=random.random(); return _rnd_last');
  p('def _midS(s,st,n=None): s=str(s);i=int(st)-1; return s[i:] if n is None else s[i:i+int(n)]');
  p('def _leftS(s,n): return str(s)[:int(n)]');
  p('def _rightS(s,n): s=str(s); return s[-int(n):] if int(n) else ""');
  p('def _spc(n): return " "*int(n)');
  p('def _tab(n): return " "*int(n)');
  p('def _fre(x): return 35000');
  p('def _usr(x): return 0');
  if(hasScrn)p('def _scrn(x,y): return 0');
  if(hasPdl) p('def _pdl(n): return 127  # PDL: returns mid-range; hook real input if needed');

  // Memory map
  p('_mem={}; _mem[222]=0; _mem[218]=0; _mem[219]=0');
  p('def _peek(a): return _mem.get(int(a),0)');
  p('def _poke(a,v): _mem[int(a)]=int(v)&0xFF');

  // Keyboard non-blocking (hardware PEEK simulation)
  if(hasKb){
    p('');
    p('# ── Non-blocking keyboard (PEEK -16384 / 49152) ────────');
    p('_kb_queue = queue.Queue()');
    p('_kb_last  = 0');
    p('def _kb_listener():');
    p('    import tty, termios, sys');
    p('    fd=sys.stdin.fileno()');
    p('    old=termios.tcgetattr(fd)');
    p('    try:');
    p('        tty.setraw(fd)');
    p('        while True:');
    p('            ch=sys.stdin.read(1)');
    p('            _kb_queue.put(ord(ch)|0x80)');
    p('    finally:');
    p('        termios.tcsetattr(fd,termios.TCSADRAIN,old)');
    p('_kb_thread=threading.Thread(target=_kb_listener,daemon=True)');
    p('_kb_thread.start()');
    p('def _kb_peek():');
    p('    global _kb_last');
    p('    try: _kb_last=_kb_queue.get_nowait()');
    p('    except queue.Empty: pass');
    p('    return _kb_last');
    p('def _kb_clear():');
    p('    global _kb_last; _kb_last=0');
    p('    while not _kb_queue.empty():');
    p('        try: _kb_queue.get_nowait()');
    p('        except: break');
    p('    return 0');
    p('_mem[-16384]=0; _mem[49152]=0');
  }

  // Speaker sound
  if(hasSpeaker){
    p('');
    p('# ── Speaker click sound (POKE -16336 / 49200) ──────────');
    p('def _speaker_click():');
    p('    try:');
    p('        import simpleaudio as sa');
    p('        import numpy as np');
    p('        sr=44100; dur=0.01');
    p('        t=np.linspace(0,dur,int(sr*dur),False)');
    p('        wave=(np.sin(2*np.pi*800*t)*32767).astype(np.int16)');
    p('        sa.play_buffer(wave,1,2,sr)');
    p('    except ImportError:');
    p('        try:');
    p('            import winsound');
    p('            winsound.Beep(800,10)');
    p('        except: pass  # speaker click (install simpleaudio for audio)');
  }

  // GET
  if(hasGet){
    p('');
    p('def _get():');
    p('    fd=sys.stdin.fileno(); old=termios.tcgetattr(fd)');
    p('    try: tty.setraw(fd); return sys.stdin.read(1)');
    p('    finally: termios.tcsetattr(fd,termios.TCSADRAIN,old)');
  }

  // CALL dispatch
  p('');
  p('# ── CALL ROM routine dispatcher ─────────────────────────');
  p('def _call_usr(addr):');
  p('    # Common Apple II ROM entry points');
  p('    a=int(addr)');
  if(needsTk){
  p('    if a in (-936,62464): _gr_text(); return');
  p('    if a in (54915,): _gr_init("lo"); return');
  p('    if a in (57350,57352): _gr_init("hi"); return');
  p('    if a in (62454,): _gr_init("hi2"); return');
  p('    if a in (62450,): _gr_text(); return');
  }
  p('    if a in (-936,62464): import os; os.system("clear||cls"); return');
  p('    if a in (-868,64668): print("\\033[2K\\033[G",end=""); return');
  p('    if a in (-922,64614): print("\\033[H",end=""); return');
  p('    # Unknown address — store in mem and continue');
  p('    _mem[a&0xFFFF]=0');

  // DOS 3.3 file I/O
  if(hasDos||hasFileInput){
    p('');
    p('# ── DOS 3.3 File I/O ────────────────────────────────────');
    p('_dos_file = None; _dos_mode = "r"');
    p('def _dos_open(fname, mode):');
    p('    global _dos_file, _dos_mode');
    p('    _dos_mode=mode');
    p('    try: _dos_file=open(fname,mode)');
    p('    except: _dos_file=None');
    p('def _dos_close():');
    p('    global _dos_file');
    p('    if _dos_file: _dos_file.close(); _dos_file=None');
    p('def _dos_set_read():');
    p('    global _dos_mode; _dos_mode="r"');
    p('def _dos_input_str():');
    p('    if _dos_file and _dos_mode=="r":');
    p('        line=_dos_file.readline()');
    p('        return line.strip() if line else ""');
    p('    return input("? ")');
    p('def _dos_input_num():');
    p('    s=_dos_input_str()');
    p('    try: return float(s)');
    p('    except: return 0.0');
    p('def _dos_print(val):');
    p('    if _dos_file and _dos_mode in ("w","a"):');
    p('        _dos_file.write(str(val)+"\\n")');
    p('    else: print(val)');
  }

  // Stop/end
  p('def _stop(line): print(f"\\nBREAK IN {line}"); sys.exit(0)');
  p('def _end():');
  if(needsTk){p('    if _tk_root:');p('        try: _tk_root.mainloop()');p('        except: pass');}
  p('    sys.exit(0)');

  // Graphics runtime
  if(needsTk){
    p('');p('# ── Graphics (tkinter) ──────────────────────────────────');
    p('_tk_root=None; _tk_canvas=None; _gr_mode=None');
    p('_gr_lo_color=0; _gr_hi_color=3; _gr_cx=0; _gr_cy=0; _gr_scale=1; _gr_rot=0');
    p('_LO_PAL=["#000000","#8C2020","#442098","#CC28B8","#006840","#808080","#229CF0","#88C0FF","#885000","#F07800","#808080","#FFA898","#10F010","#F0F018","#48D8C8","#FFFFFF"]');
    p('_HI_PAL=["#000000","#00FF00","#FF00FF","#FFFFFF","#000000","#FF6600","#0066FF","#FFFFFF"]');
    p('def _gr_init(mode):');
    p('    global _tk_root,_tk_canvas,_gr_mode');
    p('    if _tk_root is None: _tk_root=tk.Tk(); _tk_root.title("Apple ][ Graphics")');
    p('    if _tk_canvas: _tk_canvas.destroy()');
    p('    _gr_mode=mode');
    p('    if mode=="lo": _tk_canvas=tk.Canvas(_tk_root,width=480,height=480,bg="#000000")');
    p('    else: _tk_canvas=tk.Canvas(_tk_root,width=560,height=384,bg="#000000")');
    p('    _tk_canvas.pack(); _tk_root.update()');
    p('def _gr_text():');
    p('    global _tk_canvas');
    p('    if _tk_canvas: _tk_canvas.destroy(); _tk_canvas=None');
    p('    if _tk_root: _tk_root.update()');
    p('def _gr_color(n): global _gr_lo_color; _gr_lo_color=int(n)%16');
    p('def _gr_hcolor(n): global _gr_hi_color; _gr_hi_color=int(n)%8');
    p('def _gr_plot(x,y):');
    p('    if _tk_canvas is None: _gr_init("lo")');
    p('    _tk_canvas.create_rectangle(x*12,y*12,x*12+11,y*12+11,fill=_LO_PAL[_gr_lo_color],outline=""); _tk_root.update()');
    p('def _gr_vlin(y1,y2,x):');
    p('    if _tk_canvas is None: _gr_init("lo")');
    p('    col=_LO_PAL[_gr_lo_color]');
    p('    for y in range(min(y1,y2),max(y1,y2)+1): _tk_canvas.create_rectangle(x*12,y*12,x*12+11,y*12+11,fill=col,outline="")');
    p('    _tk_root.update()');
    p('def _gr_hlin(x1,x2,y):');
    p('    if _tk_canvas is None: _gr_init("lo")');
    p('    col=_LO_PAL[_gr_lo_color]');
    p('    for x in range(min(x1,x2),max(x1,x2)+1): _tk_canvas.create_rectangle(x*12,y*12,x*12+11,y*12+11,fill=col,outline="")');
    p('    _tk_root.update()');
    p('def _gr_hmove(x,y):');
    p('    global _gr_cx,_gr_cy');
    p('    if _tk_canvas is None: _gr_init("hi")');
    p('    _tk_canvas.create_rectangle(x*2,y*2,x*2+1,y*2+1,fill=_HI_PAL[_gr_hi_color],outline="")');
    p('    _gr_cx=x; _gr_cy=y; _tk_root.update()');
    p('def _gr_hline_to(x2,y2):');
    p('    global _gr_cx,_gr_cy');
    p('    if _tk_canvas is None: _gr_init("hi")');
    p('    _tk_canvas.create_line(_gr_cx*2,_gr_cy*2,x2*2,y2*2,fill=_HI_PAL[_gr_hi_color],width=1)');
    p('    _gr_cx=x2; _gr_cy=y2; _tk_root.update()');
    if(hasDraw){
      p('');
      p('# ── Shape table DRAW/XDRAW ──────────────────────────────');
      p('# Shape vectors decoded from _mem[] POKE data at runtime');
      p('_SHAPE_DX=[0,1,1,1,0,-1,-1,-1]');
      p('_SHAPE_DY=[-1,-1,0,1,1,1,0,-1]');
      p('def _gr_draw_shape(idx,cx,cy,xor_mode,scale,rot):');
      p('    global _tk_canvas');
      p('    if _tk_canvas is None: _gr_init("hi")');
      p('    # Find shape table base from _mem[232]+_mem[233]*256 (SHPTBL pointer)');
      p('    base=_mem.get(232,0)+_mem.get(233,0)*256');
      p('    if base==0: base=768  # default to $300');
      p('    # Read offset for shape idx');
      p('    off_lo=_mem.get(base+idx*2-1,0); off_hi=_mem.get(base+idx*2,0)');
      p('    saddr=base+off_lo+off_hi*256 if (off_lo+off_hi)>0 else base+idx*10');
      p('    x,y=float(cx),float(cy); col=_HI_PAL[_gr_hi_color]');
      p('    s=max(1,scale)');
      p('    for i in range(128):');
      p('        b=_mem.get(saddr+i,0)');
      p('        if b==0: break');
      p('        d1=b&7; plot1=(b&64)!=0');
      p('        x+=_SHAPE_DX[d1]*s; y+=_SHAPE_DY[d1]*s');
      p('        if plot1:');
      p('            if xor_mode: _tk_canvas.create_rectangle(int(x)*2,int(y)*2,int(x)*2+1,int(y)*2+1,fill="#000000",outline="")');
      p('            else: _tk_canvas.create_rectangle(int(x)*2,int(y)*2,int(x)*2+1,int(y)*2+1,fill=col,outline="")');
      p('        d2=(b>>3)&7');
      p('        if d2!=0:');
      p('            plot2=(b&32)!=0');
      p('            x+=_SHAPE_DX[d2]*s; y+=_SHAPE_DY[d2]*s');
      p('            if plot2:');
      p('                if xor_mode: _tk_canvas.create_rectangle(int(x)*2,int(y)*2,int(x)*2+1,int(y)*2+1,fill="#000000",outline="")');
      p('                else: _tk_canvas.create_rectangle(int(x)*2,int(y)*2,int(x)*2+1,int(y)*2+1,fill=col,outline="")');
      p('        if(b&128)!=0: break');
      p('    _tk_root.update()');
    }
  }

  if(hasData){p('');
    var dl=dataValues.map(function(v){if(/^"/.test(v))return v;var n=parseFloat(v);return isNaN(n)?JSON.stringify(v.trim()):String(n);});
    p('_data=['+dl.join(', ')+']'); p('_dp=0');}
  if(hasOnerr){p('');p('_onerr=None;_err_flag=False;_resume_next_line=0');}

  p(''); p('_line='+numbered[0].num);
  if(hasGosub)p('_ret=[]');
  p('_lmap={'+lineNums.map(function(n,i){return n+':'+i;}).join(',')+'}');
  var nextLineOf={};
  for(var i=0;i<numbered.length-1;i++)nextLineOf[numbered[i].num]=numbered[i+1].num;

  var emitLines=function(ind){
    for(var i=0;i<numbered.length;i++){
      var num=numbered[i].num,stmt=numbered[i].stmt,stmts=splitColon(stmt);
      p(ind+'if _line=='+num+':');
      if(hasTrace)p(ind+'    if _trace: print(f"['+num+']",end=" ")');
      if(hasResNext)p(ind+'    _resume_next_line='+(nextLineOf[num]||num));
      var inner=[];stmts.forEach(function(s){inner.push.apply(inner,convStmtPy(s,ind+'    ',ctx));});
      if(!inner.length)inner.push(ind+'    pass');
      inner.forEach(function(l){p(l);});
      var lastRaw=stmts[stmts.length-1].trim().toUpperCase();
      var isJump=/^(GOTO|GOSUB|ON\s|RETURN|RESUME|END|STOP)\b/.test(lastRaw)||/^IF\b/.test(lastRaw);
      if(!isJump){if(i+1<numbered.length)p(ind+'    _line='+numbered[i+1].num);else p(ind+'    break');}
    }
  };

  if(hasOnerr){
    p('while True:');p('    try:');p('        while True:');p('            if _line not in _lmap: break');
    emitLines('            ');p('        break');p('    except SystemExit: raise');
    p('    except Exception as _e:');p('        if _onerr is not None: _mem[222]=255;_err_flag=True;_line=_onerr');
    p('        else: raise');
  } else {
    p('while True:');p('    if _line not in _lmap: break');emitLines('    ');
  }
  if(warnings.length){p('');p('# ── Conversion notes ──');warnings.forEach(function(w){p('# \u26a0  '+w);});}
  return{code:L.join('\n'),warnings:warnings};
}

// ═══════════════════════════════════════════════════════════
// HTML/JS CONVERTER (Applesoft)
// ═══════════════════════════════════════════════════════════
function exprConvJS(e,fnDefs) {
  e=e.trim();
  e=e.replace(/\bINT\s*\(/gi,'Math.trunc('); e=e.replace(/\bABS\s*\(/gi,'Math.abs(');
  e=e.replace(/\bSGN\s*\(/gi,'_sgn(');       e=e.replace(/\bSQR\s*\(/gi,'Math.sqrt(');
  e=e.replace(/\bSIN\s*\(/gi,'Math.sin(');   e=e.replace(/\bCOS\s*\(/gi,'Math.cos(');
  e=e.replace(/\bTAN\s*\(/gi,'Math.tan(');   e=e.replace(/\bATN\s*\(/gi,'Math.atan(');
  e=e.replace(/\bEXP\s*\(/gi,'Math.exp(');   e=e.replace(/\bLOG\s*\(/gi,'Math.log(');
  e=e.replace(/\bRND\s*\(\s*0\s*\)/gi,'_rnd(0)');
  e=e.replace(/\bRND\s*\(([^)]+)\)/gi,function(_,a){return '_rnd('+exprConvJS(a,fnDefs)+')';});
  e=e.replace(/\bLEN\s*\(/gi,'_len(');       e=e.replace(/\bMID\$\s*\(/gi,'_midS(');
  e=e.replace(/\bLEFT\$\s*\(/gi,'_leftS('); e=e.replace(/\bRIGHT\$\s*\(/gi,'_rightS(');
  e=e.replace(/\bSTR\$\s*\(/gi,'String(');   e=e.replace(/\bVAL\s*\(/gi,'parseFloat(');
  e=e.replace(/\bCHR\$\s*\(/gi,'_chrS(');   e=e.replace(/\bASC\s*\(/gi,'_asc(');
  e=e.replace(/\bSPC\s*\(/gi,'_spc(');       e=e.replace(/\bTAB\s*\(/gi,'_tab(');
  e=e.replace(/\bSCRN\s*\(/gi,'_scrn(');     e=e.replace(/\bPDL\s*\(/gi,'_pdl(');
  e=e.replace(/\bFRE\s*\(/gi,'_fre(');       e=e.replace(/\bUSR\s*\(/gi,'_usr(');
  // Special PEEK addresses
  e=e.replace(/\bPEEK\s*\(\s*(-?\d+)\s*\)/gi,function(_,addr){
    var key=addr.trim();
    return PEEK_SPECIAL_JS[key]||('_peek('+key+')');
  });
  e=e.replace(/\bPEEK\s*\(/gi,'_peek(');
  e=e.replace(/\bINKEY\$\b/gi,'_inkeyCached');
  e=e.replace(/\bFN\s+([A-Za-z][A-Za-z0-9]*)\s*\(([^)]*)\)/gi,function(_,nm,arg){return '_fn_'+nm.toLowerCase()+'('+exprConvJS(arg,fnDefs)+')';});
  e=e.replace(/([A-Za-z][A-Za-z0-9]*)\%/g,function(_,v){return '_i_'+v.toLowerCase();});
  e=e.replace(/([A-Za-z][A-Za-z0-9]*)\$/g,function(_,v){return '_s_'+v.toLowerCase();});
  e=e.replace(/<>/g,'!=='); e=e.replace(/\^/g,'**');
  e=e.replace(/\bAND\b/gi,'&&'); e=e.replace(/\bOR\b/gi,'||'); e=e.replace(/\bNOT\b/gi,'!');
  e=e.replace(/\b([A-Z][A-Z0-9]*)\b/g,function(m){return m.toLowerCase();});
  return e;
}
function fixJSCmp(e){return e.replace(/([^=!<>])=([^=])/g,'$1===$2');}

function buildJSPrint(args,fnDefs){
  if(args.trim()==='')return['_print("")'];
  var trailSemi=/;\s*$/.test(args),trailComma=/,\s*$/.test(args);
  var parts=[],cur='',inStr=false,depth=0;
  for(var i=0;i<args.length;i++){var ch=args[i];
    if(ch==='"')inStr=!inStr;
    if(!inStr){if(ch==='('||ch==='[')depth++;if(ch===')'||ch===']')depth--;}
    if(!inStr&&depth===0&&(ch===';'||ch===',')){if(cur.trim())parts.push(cur.trim());cur='';}
    else cur+=ch;}
  if(cur.trim())parts.push(cur.trim());
  var jp=parts.map(function(p){return 'String('+exprConvJS(p,fnDefs)+')';}).join('+');
  if(trailSemi)return['_printNoNL('+(jp||'""')+')'];
  if(trailComma)return['_printTab('+(jp||'""')+')'];
  return['_print('+(jp||'""')+')'];
}

function convStmtJS(stmt,ind,ctx){
  var warnings=ctx.warnings,fnDefs=ctx.fnDefs;
  stmt=stmt.trim();if(!stmt)return[];
  var out=[],E=function(x){return exprConvJS(x,fnDefs);},EC=function(x){return fixJSCmp(E(x));};

  if(/^REM\b/i.test(stmt)||stmt.startsWith("'")){out.push(ind+'// '+stmt.replace(/^REM\s*/i,'').replace(/^'/,''));return out;}
  if(/^END$/i.test(stmt)){out.push(ind+'_end(); return;');return out;}
  if(/^STOP$/i.test(stmt)){out.push(ind+'_stop(_line); return;');return out;}
  if(/^CONT$/i.test(stmt)){out.push(ind+'// CONT');return out;}

  // DOS 3.3
  var dosOut=dosCmdJS(stmt,ind,warnings);
  if(dosOut)return dosOut;

  var prM=stmt.match(/^(?:PRINT|\?)\s*(.*)/is);
  if(prM){buildJSPrint(prM[1],fnDefs).forEach(function(l){out.push(ind+l+';');});return out;}

  var inM=stmt.match(/^INPUT\s+(.+)/i);
  if(inM){var rest=inM[1].trim(),prompt='"? "';
    var pm=rest.match(/^"([^"]*)"\s*[;,]\s*(.+)/);
    if(pm){prompt='"'+pm[1]+'"+"? "';rest=pm[2];}
    rest.split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$$/.test(vt);
      out.push(isStr?ind+pv+' = await _input('+prompt+');':ind+pv+' = parseFloat(await _input('+prompt+'));');});
    return out;}

  var getM=stmt.match(/^GET\s+(.+)/i);
  if(getM){out.push(ind+E(getM[1].trim())+' = await _get();');return out;}

  var readM=stmt.match(/^READ\s+(.+)/i);
  if(readM){readM[1].split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$$/.test(vt);
    out.push(isStr?ind+pv+' = String(_data[_dp++]);':ind+pv+' = parseFloat(_data[_dp++]);');});return out;}

  if(/^RESTORE$/i.test(stmt)){out.push(ind+'_dp=0;');return out;}
  if(/^DATA\b/i.test(stmt)){out.push(ind+'// DATA '+stmt.slice(4).trim());return out;}

  var defM=stmt.match(/^DEF\s+FN\s+([A-Za-z][A-Za-z0-9]*)\s*\(([^)]*)\)\s*=\s*(.+)/i);
  if(defM){var nm=defM[1].toLowerCase(),param=E(defM[2].trim()),body=E(defM[3]);fnDefs.push(nm);
    out.push(ind+'function _fn_'+nm+'('+param+'){return '+body+';}');return out;}

  var letM=stmt.match(/^(?:LET\s+)?([A-Za-z][A-Za-z0-9]*(?:[%$])?(?:\s*\([^)]+\))?)\s*=\s*(.+)/i);
  if(letM){out.push(ind+E(letM[1])+' = '+E(letM[2])+';');return out;}

  var forM=stmt.match(/^FOR\s+([A-Za-z][A-Za-z0-9]*%?)\s*=\s*(.+?)\s+TO\s+(.+?)(?:\s+STEP\s+(.+))?$/i);
  if(forM){var v=E(forM[1]),s=E(forM[2]),e2=E(forM[3]),st=forM[4]?E(forM[4]):'1';
    var vk=v.replace(/[^a-z0-9]/g,'_');
    out.push(ind+v+' = '+s+'; _for_end_'+vk+' = '+e2+'; _for_step_'+vk+' = '+st+';');return out;}
  if(/^NEXT\b/i.test(stmt)){out.push(ind+'// NEXT');return out;}

  var gotoM=stmt.match(/^GOTO\s+(\d+)$/i);
  if(gotoM){out.push(ind+'_line='+gotoM[1]+'; continue;');return out;}

  var onGotoM=stmt.match(/^ON\s+(.+?)\s+GOTO\s+(.+)$/i);
  if(onGotoM){var tgts=onGotoM[2].split(',').map(function(t){return t.trim();});
    out.push(ind+'{var _oi=Math.trunc('+E(onGotoM[1])+')-1;');
    tgts.forEach(function(t,i){out.push(ind+'  '+(i===0?'if':'else if')+'(_oi==='+i+'){_line='+t+';continue;}');});
    out.push(ind+'}');return out;}

  var onGosubM=stmt.match(/^ON\s+(.+?)\s+GOSUB\s+(.+)$/i);
  if(onGosubM){var tgts=onGosubM[2].split(',').map(function(t){return t.trim();});
    out.push(ind+'{var _oi=Math.trunc('+E(onGosubM[1])+')-1;');
    tgts.forEach(function(t,i){out.push(ind+'  '+(i===0?'if':'else if')+'(_oi==='+i+'){_ret.push(_line);_line='+t+';continue;}');});
    out.push(ind+'}');return out;}

  var gosubM=stmt.match(/^GOSUB\s+(\d+)$/i);
  if(gosubM){out.push(ind+'_ret.push(_line); _line='+gosubM[1]+'; continue;');return out;}
  if(/^RETURN$/i.test(stmt)){out.push(ind+'_line=_ret.pop(); continue;');return out;}
  if(/^POP$/i.test(stmt)){out.push(ind+'if(_ret.length)_ret.pop();');return out;}

  var onerrM=stmt.match(/^ONERR\s+GOTO\s+(\d+)$/i);
  if(onerrM){out.push(ind+'_onerr='+onerrM[1]+';');return out;}
  if(/^RESUME\s+NEXT$/i.test(stmt)){out.push(ind+'_line=_resumeNext; continue;');return out;}
  if(/^RESUME$/i.test(stmt)){out.push(ind+'// RESUME');return out;}

  var ifElseM=stmt.match(/^IF\s+(.+?)\s+THEN\s+(.+?)\s+ELSE\s+(.+)$/i);
  if(ifElseM){out.push(ind+'if('+EC(ifElseM[1])+'){');
    convStmtJS(ifElseM[2].trim(),ind+'  ',ctx).forEach(function(l){out.push(l);});
    out.push(ind+'}else{');
    convStmtJS(ifElseM[3].trim(),ind+'  ',ctx).forEach(function(l){out.push(l);});
    out.push(ind+'}');return out;}

  var ifM=stmt.match(/^IF\s+(.+?)\s+THEN\s+(.+)$/i);
  if(ifM){var then=ifM[2].trim(),gonly=then.match(/^(?:GOTO\s+)?(\d+)$/i);
    out.push(ind+'if('+EC(ifM[1])+'){');
    if(gonly)out.push(ind+'  _line='+gonly[1]+'; continue;');
    else splitColon(then).forEach(function(s){convStmtJS(s,ind+'  ',ctx).forEach(function(l){out.push(l);});});
    out.push(ind+'}');return out;}

  var ifGotoM=stmt.match(/^IF\s+(.+?)\s+GOTO\s+(\d+)$/i);
  if(ifGotoM){out.push(ind+'if('+EC(ifGotoM[1])+'){_line='+ifGotoM[2]+';continue;}');return out;}

  var dimM=stmt.match(/^DIM\s+(.+)$/i);
  if(dimM){var decls=[],cur='',depth=0;
    (dimM[1]+',').split('').forEach(function(ch){if(ch==='(')depth++;if(ch===')')depth--;if(ch===','&&depth===0){decls.push(cur.trim());cur='';}else cur+=ch;});
    decls.forEach(function(d){var am=d.match(/([A-Za-z][A-Za-z0-9]*[%$]?)\s*\(([^)]+)\)/i);
      if(am){var nm=E(am[1]),dims=am[2].split(',').map(function(x){return parseInt(x.trim())+1;});
        if(dims.length===1)out.push(ind+nm+'=new Array('+dims[0]+').fill(0);');
        else if(dims.length===2)out.push(ind+nm+'=Array.from({length:'+dims[0]+'},()=>new Array('+dims[1]+').fill(0));');
        else out.push(ind+nm+'=Array.from({length:'+dims[0]+'},()=>Array.from({length:'+dims[1]+'},()=>new Array('+dims[2]+').fill(0)));');}});
    return out;}

  // Graphics
  if(/^GR$/i.test(stmt)){out.push(ind+"_grInit('lo');");return out;}
  if(/^HGR2$/i.test(stmt)){out.push(ind+"_grInit('hi2');");return out;}
  if(/^HGR$/i.test(stmt)){out.push(ind+"_grInit('hi');");return out;}
  var colorM=stmt.match(/^COLOR\s*=\s*(.+)$/i);
  if(colorM){out.push(ind+'_grColor(Math.trunc('+E(colorM[1])+'));');return out;}
  var hcolorM=stmt.match(/^HCOLOR\s*=\s*(.+)$/i);
  if(hcolorM){out.push(ind+'_grHcolor(Math.trunc('+E(hcolorM[1])+'));');return out;}
  var scaleM=stmt.match(/^SCALE\s*=\s*(.+)$/i);
  if(scaleM){out.push(ind+'_grScale=Math.trunc('+E(scaleM[1])+');');return out;}
  var rotM=stmt.match(/^ROT\s*=\s*(.+)$/i);
  if(rotM){out.push(ind+'_grRot=Math.trunc('+E(rotM[1])+');');return out;}
  var plotM=stmt.match(/^PLOT\s+(.+?)\s*,\s*(.+)$/i);
  if(plotM){out.push(ind+'_grPlot(Math.trunc('+E(plotM[1])+'),Math.trunc('+E(plotM[2])+'));');return out;}
  var hplotM=stmt.match(/^HPLOT\s+(.+)$/i);
  if(hplotM){var pts=hplotM[1].split(/\bTO\b/i).map(function(p){return p.trim();});
    var xy0=pts[0].split(',').map(function(q){return q.trim();});
    out.push(ind+'_grHmove(Math.trunc('+E(xy0[0])+'),Math.trunc('+E(xy0[1])+'));');
    for(var i=1;i<pts.length;i++){var xy=pts[i].split(',').map(function(q){return q.trim();});out.push(ind+'_grHlineTo(Math.trunc('+E(xy[0])+'),Math.trunc('+E(xy[1])+'));');}
    return out;}
  var vlinM=stmt.match(/^VLIN\s+(.+?)\s*,\s*(.+?)\s+AT\s+(.+)$/i);
  if(vlinM){out.push(ind+'_grVlin(Math.trunc('+E(vlinM[1])+'),Math.trunc('+E(vlinM[2])+'),Math.trunc('+E(vlinM[3])+'));');return out;}
  var hlinM=stmt.match(/^HLIN\s+(.+?)\s*,\s*(.+?)\s+AT\s+(.+)$/i);
  if(hlinM){out.push(ind+'_grHlin(Math.trunc('+E(hlinM[1])+'),Math.trunc('+E(hlinM[2])+'),Math.trunc('+E(hlinM[3])+'));');return out;}

  // DRAW/XDRAW shape table
  var drawM=stmt.match(/^(X?)DRAW\s+(.+?)\s+AT\s+(.+?)\s*,\s*(.+)$/i);
  if(drawM){var isX=drawM[1].toUpperCase()==='X';
    out.push(ind+'_grDrawShape(Math.trunc('+E(drawM[2])+'),Math.trunc('+E(drawM[3])+'),Math.trunc('+E(drawM[4])+'),'+isX+',_grScale,_grRot);');return out;}
  var draw2M=stmt.match(/^(X?)DRAW\s+(\d+)$/i);
  if(draw2M){var isX=draw2M[1].toUpperCase()==='X';
    out.push(ind+'_grDrawShape(Math.trunc('+E(draw2M[2])+'),_grCx,_grCy,'+isX+',_grScale,_grRot);');return out;}

  if(/^TEXT$/i.test(stmt)){out.push(ind+'_grText();');return out;}
  if(/^HOME$/i.test(stmt)){out.push(ind+'_home();');return out;}
  if(/^INVERSE$/i.test(stmt)){out.push(ind+'_inverse();');return out;}
  if(/^NORMAL$/i.test(stmt)){out.push(ind+'_normal();');return out;}
  if(/^FLASH$/i.test(stmt)){out.push(ind+'_flash();');return out;}
  var vtabM=stmt.match(/^VTAB\s+(.+)$/i);
  if(vtabM){out.push(ind+'_vtab(Math.trunc('+E(vtabM[1])+'));');return out;}
  var htabM=stmt.match(/^HTAB\s+(.+)$/i);
  if(htabM){out.push(ind+'_htab(Math.trunc('+E(htabM[1])+'));');return out;}

  // POKE with special address handling
  var pokeM=stmt.match(/^POKE\s+(-?\d+)\s*,\s*(.+)$/i);
  if(pokeM){var addr=pokeM[1].trim(),val=E(pokeM[2]);
    if(POKE_SPECIAL_JS[addr])out.push(ind+POKE_SPECIAL_JS[addr]);
    else out.push(ind+'_poke('+addr+','+val+');');
    return out;}
  var pokeExprM=stmt.match(/^POKE\s+(.+?)\s*,\s*(.+)$/i);
  if(pokeExprM){out.push(ind+'_poke('+E(pokeExprM[1])+','+E(pokeExprM[2])+');');return out;}

  // CALL with ROM lookup
  var callM=stmt.match(/^CALL\s+(-?\d+)$/i);
  if(callM){var caddr=callM[1].trim();
    if(CALL_TABLE_JS[caddr])out.push(ind+CALL_TABLE_JS[caddr]);
    else out.push(ind+'_callUsr('+caddr+');');
    return out;}
  var callExprM=stmt.match(/^CALL\s+(.+)$/i);
  if(callExprM){out.push(ind+'_callUsr('+E(callExprM[1])+');');return out;}

  if(/^(HIMEM|LOMEM)\s*:/i.test(stmt)||/^SPEED\s*=/i.test(stmt)){out.push(ind+'// '+stmt);return out;}
  if(/^(PR|IN)#\s*\d+$/i.test(stmt)){out.push(ind+'// '+stmt);return out;}
  if(/^TRACE$/i.test(stmt)){out.push(ind+'_trace=true;');return out;}
  if(/^NOTRACE$/i.test(stmt)){out.push(ind+'_trace=false;');return out;}
  if(/^CLEAR$/i.test(stmt)){out.push(ind+'// CLEAR');return out;}
  if(/^(NEW|LIST|LOAD|SAVE|RUN)$/i.test(stmt)){out.push(ind+'// '+stmt);return out;}

  warnings.push('Unrecognised: "'+stmt+'"');
  out.push(ind+'// TODO: '+stmt);
  return out;
}

// ALTERNATIVE DIALECT CONVERTERS (GW-BASIC, C64, BBC)
// ═══════════════════════════════════════════════════════════
function convertAltToPython(code, dialect) {
  var warnings=['Dialect: '+dialect.toUpperCase()+' BASIC'];
  var numbered=parseNumbered(code);
  if(!numbered.length)throw new Error('No valid BASIC line numbers found.');
  var lineNums=numbered.map(function(l){return l.num;});
  var L=[],p=function(){for(var i=0;i<arguments.length;i++)L.push(arguments[i]);};
  var dataValues=[];
  numbered.forEach(function(l){if(/^DATA\b/i.test(l.stmt))parseDataLine(l.stmt.slice(4).trim()).forEach(function(it){dataValues.push(it);});});

  p('# ═══════════════════════════════════════════════════════');
  p('# Converted from '+dialect.toUpperCase()+' BASIC  \u2192  Python 3');
  p('# Apple ][ \u2192 Code Converter  v5.0');
  p('# ═══════════════════════════════════════════════════════');

  p('def _leftS(s,n): return str(s)[:int(n)]');
  p('def _rightS(s,n): s=str(s); return s[-int(n):] if int(n) else ""');
  p('def _spc(n): return " "*int(n)');
  p('def _tab(n): return " "*int(n)');
  p('def _fre(x): return 35000');
  p('_inkey=""  # INKEY$ — set by keyboard handler if running with pygame');

    p('    _tk_canvas.pack(); _tk_root.update()');
    p('GW_COLORS=["#000000","#0000AA","#00AA00","#00AAAA","#AA0000","#AA00AA","#AA5500","#AAAAAA","#555555","#5555FF","#55FF55","#55FFFF","#FF5555","#FF55FF","#FFFF55","#FFFFFF"]');
    p('def _screen(n):');
    p('    global _screen_mode');
    p('    _screen_mode=n');
    p('    if n==1: _init_gfx(640,400)  # CGA 320x200 -> 2x scale');
    p('    elif n==2: _init_gfx(640,400)  # CGA 640x200');
    p('    elif n==9: _init_gfx(640,350)  # EGA');
    p('def _locate(row,col):');
    p('    print(f"\\033[{row};{col}H",end="")');
    p('def _color_text(fg,bg=None):');
    p('    codes={"fg":{7:37,8:90,15:97,0:30,1:34,2:32,3:36,4:31,5:35,6:33,14:93,10:92,11:96,12:91,13:95,9:94}}');
    p('    fc=codes["fg"].get(fg,37)');
    p('    print(f"\\033[{fc}m",end="")');
    p('def _line_gfx(x1,y1,x2,y2,col,filled=False):');
    p('    if _tk_canvas is None: _init_gfx(640,400)');
    p('    c=GW_COLORS[col%16]');
    p('    if filled: _tk_canvas.create_rectangle(min(x1,x2)*2,min(y1,y2)*2,max(x1,x2)*2,max(y1,y2)*2,fill=c,outline=c)');
    p('    else: _tk_canvas.create_line(x1*2,y1*2,x2*2,y2*2,fill=c)');
    p('    _tk_root.update()');

    p('    if _tk_canvas is None: _init_gfx(640,400)');

    p('    _tk_canvas.create_rectangle(x*2,y*2,x*2+1,y*2+1,fill=c,outline="")');
    p('    _tk_root.update()');

    p('    pass  # PLAY: install simpleaudio + music parser for full support');

    p('    if addr==53280: pass  # border color');
    p('    elif addr==53281: pass  # bg color');
    p('    elif addr==646: pass  # text color');
    p('    elif addr==53269: pass  # sprite enable');
    p('def _sys(addr): pass  # SYS: machine language call');
    p('def _cls(): print("\\033[2J\\033[H",end="")  # CHR$(147)');
  } else if(dialect==='bbc'){
    p('');
    p('# ── BBC BASIC specific ──────────────────────────────────');
    p('_mode=0; _tk_root=None; _tk_canvas=None; _cx=0; _cy=0; _fg=7; _bg=0');
    p('BBC_COLORS=["#000000","#FF0000","#00FF00","#FFFF00","#0000FF","#FF00FF","#00FFFF","#FFFFFF"]');
    p('def _init_gfx(w,h):');
    p('    global _tk_root,_tk_canvas');
    p('    if _tk_root is None: _tk_root=tk.Tk(); _tk_root.title("BBC BASIC Graphics")');

    p('    global _mode');
    p('    _mode=n');
    p('    if n in (4,5): _init_gfx(640,512)');
    p('    elif n in (0,1,2): _init_gfx(640,512)');
    p('    elif n==7: print("\\033[2J\\033[H",end="")  # teletext mode');
    p('def _move(x,y): global _cx,_cy; _cx=x; _cy=y');

    var dl=dataValues.map(function(v){if(/^"/.test(v))return v;var n=parseFloat(v);return isNaN(n)?JSON.stringify(v.trim()):String(n);});

// Alt dialect statement converter — handles GW/C64/BBC specific statements
// then falls through to Applesoft converter for shared commands
function convStmtAltPy(stmt,ind,ctx,dialect) {
  var warnings=ctx.warnings,fnDefs=ctx.fnDefs;
  stmt=stmt.trim(); if(!stmt)return[];
  var out=[],E=function(x){return exprConvPy(x,fnDefs);};

  // GW-BASIC specific
  if(dialect==='gw'){
    if(/^CLS$/i.test(stmt)){out.push(ind+'_cls()');return out;}
    var locM=stmt.match(/^LOCATE\s+(.+?)\s*,\s*(.+)$/i);
    if(locM){out.push(ind+'_locate(int('+E(locM[1])+'),int('+E(locM[2])+'))');return out;}
    var colTextM=stmt.match(/^COLOR\s+(.+?)(?:\s*,\s*(.+))?$/i);
    if(colTextM&&!/^HGR\b/i.test(stmt)){out.push(ind+'_color_text(int('+E(colTextM[1])+')'+(colTextM[2]?',int('+E(colTextM[2])+')'  :'')+')');return out;}
    var screenM=stmt.match(/^SCREEN\s+(.+)$/i);
    if(screenM){out.push(ind+'_screen(int('+E(screenM[1])+'))');return out;}
    var lineM=stmt.match(/^LINE\s+\((.+?),(.+?)\)-\((.+?),(.+?)\)\s*,\s*(\d+)(?:\s*,\s*(BF?))?$/i);
    if(lineM){var filled=lineM[6]&&lineM[6].toUpperCase()==='BF';
      out.push(ind+'_line_gfx(int('+E(lineM[1])+'),int('+E(lineM[2])+'),int('+E(lineM[3])+'),int('+E(lineM[4])+'),int('+E(lineM[5])+'),'+filled+')');return out;}
    var circM=stmt.match(/^CIRCLE\s+\((.+?),(.+?)\)\s*,\s*(.+?)\s*,\s*(\d+)/i);
    if(circM){out.push(ind+'_circle_gfx(int('+E(circM[1])+'),int('+E(circM[2])+'),int('+E(circM[3])+'),int('+E(circM[4])+'))');return out;}
    var psetM=stmt.match(/^PSET\s+\((.+?),(.+?)\)\s*,\s*(.+)$/i);
    if(psetM){out.push(ind+'_pset(int('+E(psetM[1])+'),int('+E(psetM[2])+'),int('+E(psetM[3])+'))');return out;}
    var playM=stmt.match(/^PLAY\s+"([^"]+)"/i);
    if(playM){out.push(ind+'_play_music("'+playM[1]+'")'  );return out;}
    // File I/O: OPEN "file" FOR mode AS #n
    var openM=stmt.match(/^OPEN\s+"([^"]*)"\s+FOR\s+(INPUT|OUTPUT|APPEND)\s+AS\s+#(\d+)/i);
    if(openM){var modeMap={INPUT:'r',OUTPUT:'w',APPEND:'a'};
      out.push(ind+'_fopen('+openM[3]+',"'+openM[1]+'","'+modeMap[openM[2].toUpperCase()]+'")');return out;}
    var closeM=stmt.match(/^CLOSE\s+#?(\d+)/i);
    if(closeM){out.push(ind+'_fclose('+closeM[1]+')');return out;}
    var printFileM=stmt.match(/^PRINT\s*#\s*(\d+)\s*,\s*(.+)/i);
    if(printFileM){out.push(ind+'_fprint('+printFileM[1]+','+E(printFileM[2])+')');return out;}
    var inputFileM=stmt.match(/^INPUT\s*#\s*(\d+)\s*,\s*(.+)/i);
    if(inputFileM){var vt=inputFileM[2].trim(),pv=E(vt),isStr=/\$$/.test(vt);
      out.push(isStr?ind+pv+'=_finput_str('+inputFileM[1]+')':ind+pv+'=_finput_num('+inputFileM[1]+')');return out;}
    var inkeyM=stmt.match(/^(.+?)\s*=\s*INKEY\$/i);
    if(inkeyM){out.push(ind+E(inkeyM[1])+' = _inkey');return out;}
  }

  if(dialect==='c64'){
    if(/^PRINT\s*CHR\$\s*\(\s*147\s*\)/i.test(stmt)){out.push(ind+'_cls()');return out;}
    var sysM=stmt.match(/^SYS\s+(.+)$/i);
    if(sysM){out.push(ind+'_sys(int('+E(sysM[1])+'))');return out;}
    var pokeM=stmt.match(/^POKE\s+(.+?)\s*,\s*(.+)$/i);
    if(pokeM){out.push(ind+'_poke_c64(int('+E(pokeM[1])+'),int('+E(pokeM[2])+'))');return out;}
  }

  if(dialect==='bbc'){
    if(/^CLS$/i.test(stmt)){out.push(ind+'_cls()');return out;}
    var modeM=stmt.match(/^MODE\s+(.+)$/i);
    if(modeM){out.push(ind+'_mode_cmd(int('+E(modeM[1])+'))');return out;}
    var moveM=stmt.match(/^MOVE\s+(.+?)\s*,\s*(.+)$/i);
    if(moveM){out.push(ind+'_move(int('+E(moveM[1])+'),int('+E(moveM[2])+'))');return out;}
    var drawM=stmt.match(/^DRAW\s+(.+?)\s*,\s*(.+)$/i);
    if(drawM){out.push(ind+'_draw(int('+E(drawM[1])+'),int('+E(drawM[2])+'))');return out;}
    var vduM=stmt.match(/^VDU\s+(.+)$/i);
    if(vduM){out.push(ind+'_vdu(int('+E(vduM[1])+'))');return out;}
    var colM=stmt.match(/^COLOUR\s+(.+)$/i);
    if(colM){out.push(ind+'_colour(int('+E(colM[1])+'))');return out;}
    // PROC/ENDPROC/DEF PROC
    if(/^ENDPROC$/i.test(stmt)){out.push(ind+'return');return out;}
    var procCallM=stmt.match(/^(?:PROC|CALL)\s+([A-Za-z][A-Za-z0-9_]*)/i);
    if(procCallM){out.push(ind+'_proc_'+procCallM[1].toLowerCase()+'()');return out;}
    var defProcM=stmt.match(/^DEF\s+PROC\s+([A-Za-z][A-Za-z0-9_]*)/i);
    if(defProcM){out.push(ind+'def _proc_'+defProcM[1].toLowerCase()+'():');return out;}
  }

  // Fall back to Applesoft converter for shared commands
  return convStmtPy(stmt,ind,ctx);
}

// Alt dialect HTML converter — wraps Applesoft HTML with dialect patches
function convertAltToHTML(code, dialect) {
  // Pre-process: convert dialect-specific syntax to Applesoft equivalents
  var lines=code.split('\n');
  var converted=lines.map(function(line){
    var m=line.match(/^(\s*\d+\s*)(.*)/);
    if(!m)return line;
    var num=m[1],stmt=m[2];
    // GW-BASIC conversions
    if(dialect==='gw'){
      stmt=stmt.replace(/\bCLS\b/gi,'HOME');
      stmt=stmt.replace(/\bINKEY\$/gi,'_inkeyCached');
      stmt=stmt.replace(/^LOCATE\s+(\S+)\s*,\s*(\S+)/i,'VTAB $1: HTAB $2');
      stmt=stmt.replace(/^SCREEN\s+\d+/i,'HGR');
    }
    if(dialect==='c64'){
      stmt=stmt.replace(/PRINT\s*CHR\$\s*\(\s*147\s*\)/gi,'HOME');
      stmt=stmt.replace(/\bSYS\b/gi,'CALL');
    }
    if(dialect==='bbc'){
      stmt=stmt.replace(/^CLS\b/i,'HOME');
      stmt=stmt.replace(/^MODE\s+\d+/i,'HGR');
    }
    return num+stmt;
  });
  var result=convertToHTML(converted.join('\n'));
  result.warnings.unshift('Dialect: '+dialect.toUpperCase()+' BASIC (converted to Applesoft equivalents)');
  return result;
}
